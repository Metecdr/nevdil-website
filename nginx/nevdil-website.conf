# ──────────────────────────────────────────────────────────────────────────────
# Nev-Dil Website — Nginx Konfigürasyonu
# Dosya yolu (VPS'te): /etc/nginx/sites-available/nevdil-website
# Aktif etmek için: sudo ln -s /etc/nginx/sites-available/nevdil-website /etc/nginx/sites-enabled/
#
# ÖNEMLİ: Bu dosya köstebek_proje config'ine dokunmaz.
# Sadece nevdil.com (veya senin domainin) için ayrı bir server block.
# ──────────────────────────────────────────────────────────────────────────────

# Rate limiting zone — http context'e ait, bu dosyada tanımlanıyor
# Not: nginx.conf içinde include sites-enabled/* varsa burası http context'te okunur
limit_req_zone $binary_remote_addr zone=nevdil_form:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=nevdil_general:10m rate=30r/m;

# HTTP → HTTPS yönlendirmesi
server {
    listen 80;
    listen [::]:80;
    server_name nevdil.com www.nevdil.com;  # ← kendi domainin

    # Let's Encrypt doğrulaması için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Ana HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nevdil.com www.nevdil.com;  # ← kendi domainin

    # SSL — Certbot ile otomatik doldurulur
    ssl_certificate /etc/letsencrypt/live/nevdil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nevdil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Genel rate limit
    limit_req zone=nevdil_general burst=20 nodelay;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Next.js uygulamasına proxy
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Form endpoint'leri için ekstra sıkı rate limit
    location ~ ^/(on-kayit|iletisim) {
        limit_req zone=nevdil_form burst=3 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin sayfasını sadece belirli IP'lerden eriş (opsiyonel)
    # location /admin {
    #     allow 1.2.3.4;  # kendi IP'n
    #     deny all;
    #     proxy_pass http://localhost:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Static dosyalar için cache
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Büyük istek gövdelerini reddet
    client_max_body_size 1M;
}
